<!DOCTYPE html>
<html lang="es-Es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="@mjs">
    <title>Ejercicio 28 - JavaScript</title>
    <style>
        body {
            text-align: center;
        }
    </style>

    <script>
        let minimo = 1;
        let maximo = 999;
        let intentos = 1;
        let numeroActual = Math.floor((minimo + maximo) / 2);
        // resultado.innerText = `${numeroActual}` // No funciona

        function mayor() {
            minimo = numeroActual + 1;
            intentoNuevo();
        }

        function menor() {
            maximo = numeroActual - 1;
            intentoNuevo();
        }

        function confirmar() {
            resultado.innerText = `El número es: ${numeroActual} Intentos: ${intentos}`;
        }

        function intentoNuevo() {
            intentos++;
            if (minimo > maximo) {
                resultado.innerText = "Incoherente";
                return;
            }
            numeroActual = Math.floor((minimo + maximo) / 2);
            resultado.innerText = `¿Es ${numeroActual}?`;
        }
    </script>
</head>

<body>
    <h2>Piensa un número del 1 al 999</h2>

    <p id="resultado">¿Es 500?</p>

    <button onclick="mayor()">Mayor</button>
    <button onclick="menor()">Menor</button>
    <button onclick="confirmar()">Confirmar</button>

</body>

</html>
