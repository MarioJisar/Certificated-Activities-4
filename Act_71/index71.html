<!doctype html>
<html lang="es-ES">

<head>
    <meta charset="UTF-8" />
    <meta name="author" content="@mjs" />
    <title>Ejercicio 71 - JavaScript</title>
    <style>
        body {
            margin: 20px;
        }

        p {
            font-family: "Courier New", Courier, monospace;
        }
    </style>
</head>

<body>
    <h1>Mini Sudoku 4x4</h1>
    <p id="matrizInicial"></p>
    <h2>Huecos</h2>
    <p id="huecos"></p>
    <h2>Matriz final</h2>
    <p id="matrizFinal"></p>

    <script>
        setTimeout(() => {
            const matrizInicial = [
                [1, 0, 3, 4],
                [3, 4, 0, 2],
                [2, 1, 4, 0],
                [0, 3, 2, 1],
            ];

            let cadenaMatrizInicial = "";
            let cadenaMatrizFinal = "";
            let cadenaHueco = "";

            function mostrar() {
                for (let row1 = 0; row1 < matrizInicial.length; row1++) {
                    for (let col1 = 0; col1 < matrizInicial[row1].length; col1++) {
                        cadenaMatrizInicial += `${matrizInicial[row1][col1]} `;
                        comprobar(row1, col1);
                    }
                    cadenaMatrizInicial += `<br>`;
                }
            }

            function comprobar(row, col) {
                if (matrizInicial[row][col] === 0) {
                    cadenaHueco += `Fila ${row}, Col ${col} <br>`;
                    do {
                        matrizInicial[row][col] = prompt(`Introduce un número para fila ${row} y columna ${col}:`);
                    } while (
                        matrizInicial[row][col] != 1 &&
                        matrizInicial[row][col] != 2 &&
                        matrizInicial[row][col] != 3 &&
                        matrizInicial[row][col] != 4
                    );
                }
            }

            mostrar();
            document.getElementById("matrizInicial").innerHTML = cadenaMatrizInicial;
            document.getElementById("huecos").innerHTML = cadenaHueco;

            cadenaMatrizInicial = "";

            //   matrizInicial[0][1] = prompt("Introduce un número para F0 C1:");
            //   matrizInicial[1][2] = prompt("Introduce un número para F1 C2:");
            //   matrizInicial[2][3] = prompt("Introduce un número para F2 C3:");
            //   matrizInicial[3][0] = prompt("Introduce un número para F3 C0:");

            mostrar();
            document.getElementById("matrizFinal").innerHTML = cadenaMatrizInicial;

        }, 1000);
    </script>
</body>

</html>
