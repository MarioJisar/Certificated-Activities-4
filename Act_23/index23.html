<!DOCTYPE html>
<html lang="es-Es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="@mjs">
    <title>Ejercicio 23 - JavaScript</title>
    <style>
        body {
            text-align: center;
        }
    </style>
    <script>
        function calcularMes() {
            let numero = +numeroIntroducido.value;
            let mes;

            switch (numero) {
                case 1: mes = "Enero"; break;
                case 2: mes = "Febreo"; break;
                case 3: mes = "Marzo"; break;
                case 4: mes = "Abril"; break;
                case 5: mes = "Mayo"; break;
                case 6: mes = "Junio"; break;
                case 7: mes = "Julio"; break;
                case 8: mes = "Agosto"; break;
                case 9: mes = "Septiembre"; break;
                case 10: mes = "Octubre"; break;
                case 11: mes = "Noviembre"; break;
                case 12: mes = "Diciembre"; break;
                default: mes = "Mes no válido";
            }

            resultado.innerText = `${mes}`;
        }
    </script>
</head>

<body>
    <h1>Mes del año</h1>
    <input type="number" id="numeroIntroducido" name="numeroIntroducido" placeholder="Introduce un número">
    <button onclick="calcularMes()">Calcular</button><br>
    <p id="resultado"></p>
</body>

</html>
