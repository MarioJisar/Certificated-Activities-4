<!DOCTYPE html>
<html lang="es-Es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="@mjs">
    <title>Ejercicio 33 - JavaScript</title>
</head>

<body>
    <h1>Bebidas</h1>
    <pre id="resultado"></pre>

    <script>
        let cadenaBebidas = "";
        let bebidas = ["Agua", "Refresco", "Cerveza", "Leche", "Vino", "Zumo"];
        for (let cont = 0; cont < bebidas.length; cont++) {
            cadenaBebidas += bebidas[cont] + "\n";
        }
        document.getElementById("resultado").innerText = cadenaBebidas;
    </script>
</body>

</html>
