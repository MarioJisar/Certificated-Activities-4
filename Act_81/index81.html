<!DOCTYPE html>
<html lang="es-Es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="@mjs">
    <title>Ejercicio 81 - JavaScript</title>

    <style>
        body {
            text-align: center;
            font-size: large;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <h1>Suma de cuadrados de números</h1>
    <p id="resultadoArray"></p>
    <p id="resultadoSuma"></p>

    <script>
        const numeros = [5, 4, 8, 6, 2];

        let resultado = numeros.reduce(function (cont, numero) {
            // return cont + Math.pow(numero, 2);
            return cont + numero ** 2;
        }, 0);

        document.getElementById("resultadoArray").innerHTML = `Los números del array son: ${numeros}`;

        document.getElementById("resultadoSuma").innerHTML = `La suma de los cuadrados es: ${resultado}`;
    </script>
</body>

</html>
