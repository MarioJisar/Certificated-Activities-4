<!DOCTYPE html>
<html lang="es-Es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="@mjs">
    <title>Ejercicio 66 - JavaScript</title>
    <style>
        body {
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Comprobar palíndromo</h1>
    <input type="text" id="palabra">
    <button onclick="comprobar()">Comprobar</button>
    <p id="resultado"></p>

    <script>
        function comprobar() {
            let resultado = document.getElementById("resultado");
            let palabra = document.getElementById("palabra").value.toLowerCase();

            let palabraNueva = palabra.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");

            let invertida = palabraNueva.split("").reverse().join("");

            resultado.textContent = (palabraNueva === invertida && palabraNueva !== "") ? "Es un palíndromo" : "No es un palíndromo";
        }
    </script>
</body>

</html>
