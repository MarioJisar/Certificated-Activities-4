<!DOCTYPE html>
<html lang="es-Es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="@mjs">
    <title>Ejercicio 07 - JavaScript</title>
    <style>
        body {
            text-align: center;
        }
    </style>
    <script>
        let cadenaNumeros = '';
        let numero = 1;
        function mostrarNumeros() {
            while (numero <= 50) {
                cadenaNumeros += numero + '<br>';
                numero++;
            }
            document.getElementById('resultado').innerHTML = cadenaNumeros;
        }
    </script>
</head>

<body>
    <h1>Mostrar cadena de númeos</h1>
    <label for="numero">Número: </label><br><br>
    <button onclick="mostrarNumeros()">Comprobar</button><br>
    <p id="resultado"></p>
</body>

</html>
