<!DOCTYPE html>
<html lang="es-Es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="@mjs">
    <title>Ejercicio 08 - JavaScript</title>
    <style>
        body {
            text-align: center;
        }
    </style>
    <script>
        function mostrarNumeros() {
            let cadenaNumeros = '';
            let numeroInicial = 0;
            let numero = Number (document.getElementById('numero').value);
            do {
                cadenaNumeros += numeroInicial + ' ';
                numeroInicial++;
            }
            while (numeroInicial <= numero);
            document.getElementById('resultado').textContent = cadenaNumeros;
        }
    </script>
</head>

<body>
    <h1>Mostrar cadena de númeos</h1>
    <label for="numero">Número: </label><br><br>
    <input type="number" id="numero" name="numero" placeholder="Introduce un número"><br><br>
    <button onclick="mostrarNumeros()">Comprobar</button><br>
    <p id="resultado"></p>
</body>

</html>
