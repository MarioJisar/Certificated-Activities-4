<!DOCTYPE html>
<html lang="es-Es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="@mjs">
    <title>Ejercicio 51 - JavaScript</title>
</head>

<body>
    <h1>Bebidas</h1>
    <p id="resultado"></p>

    <script>
        let cadenaBebidas = "";
        let bebidas = ["Agua", "Refresco", "Cerveza", "Leche", "Vino", "Zumo", "Limonada"];

        cadenaBebidas += `<b>Array original: <br></b>`;
        for (let cont = 0; cont < bebidas.length; cont++) {
            cadenaBebidas += `[${cont}] ${bebidas[cont]} <br>`;
        }
        
        cadenaBebidas += "<br>";
        let valorEncontrado = "Zumo";
        let valorABuscar = bebidas.indexOf(valorEncontrado);

        cadenaBebidas += `<b>Elemento a buscar: ${valorEncontrado}</b><br>`;
        cadenaBebidas += "<br>";
        cadenaBebidas += `<b>Resultado indexOf: ${valorABuscar}</b><br>`;
        cadenaBebidas += "<br>";
        cadenaBebidas += valorABuscar !== -1 ? `<b>¡¡¡Elemento encontrado!!!</b>` : `<b>¡¡¡Elemento NO encontrado!!! :(</b>`;
        cadenaBebidas += "<br>";
        // cadenaBebidas += "<br>";
        // cadenaBebidas += `<b>Elemento a buscar: ${"Vermut"}</b><br>`;
        // cadenaBebidas += "<br>";
        // cadenaBebidas += bebidas[5] === "Vermut" ? `<b>¡¡¡Elemento encontrado!!!</b>` : `<b>¡¡¡Elemento NO encontrado!!! :(</b>`;
        cadenaBebidas += "<br>";
        let valorEliminado = delete bebidas[valorABuscar];        
        cadenaBebidas += `<b>Resultado deleted:</b> ${valorEliminado} <br>`
        cadenaBebidas += "<br>";
        cadenaBebidas += `<b>Array actualizado: <br></b>`;
        for (let cont = 0; cont < bebidas.length; cont++) {
            cadenaBebidas += `[${cont}] ${bebidas[cont]} <br>`;
        }
        cadenaBebidas += "<br>";
        cadenaBebidas += `<b>Valor del índice 5:</b> ${bebidas[5]} <br>`;
        
        document.getElementById("resultado").innerHTML = cadenaBebidas;
    </script>
</body>

</html>
