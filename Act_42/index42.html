<!DOCTYPE html>
<html lang="es-Es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="@mjs">
    <title>Ejercicio 42 - JavaScript</title>
</head>

<body>
    <h1>Bebidas</h1>
    <p id="resultado"></p>

    <script>
        let cadenaBebidas = "";
        let bebidas = ["Agua", "Refresco", "Cerveza", "Leche", "Vino", "Zumo"];

        for (let cont = 0; cont < bebidas.length; cont++) {
            cadenaBebidas += `[${cont}] ${bebidas[cont]} <br>`;
        }

        cadenaBebidas += "<br>";
        cadenaBebidas += `Número total de elementos del array original: ${bebidas.length} <br>`;
        let valorEliminado = bebidas.unshift("Limonada");
        cadenaBebidas += "<br>";

        for (let cont = 0; cont < bebidas.length; cont++) {
            cadenaBebidas += `[${cont}] ${bebidas[cont]} <br>`;
        }
        
        cadenaBebidas += "<br>";
        cadenaBebidas += `Número total de elementos del array actualizado: ${bebidas.length} <br>`;

        document.getElementById("resultado").innerHTML = cadenaBebidas;
    </script>
</body>

</html>
